<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網頁互動教學 - 點擊動物</title>
    <!-- 引入 Tailwind CSS 進行快速且美觀的排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 貓咪專用：由營幕右側往左側跑動 */
        @keyframes runRightToLeft {
            0% { right: -400px; }
            100% { right: 100vw; }
        }

        /* 小鳥專用：直接在中心點出現並停留 */
        @keyframes birdDirectAppear {
            0% { transform: translate(-50%, -50%); opacity: 1; }
            100% { transform: translate(-50%, -50%); opacity: 1; }
        }

        .running-animation {
            animation: runRightToLeft 4s linear forwards;
            display: block;
        }

        .bird-animation {
            /* 小鳥 GIF 持續時間 4 秒 */
            animation: birdDirectAppear 4s linear forwards;
            display: block;
        }

        /* 隱藏全域捲軸 */
        body {
            overflow: hidden;
            margin: 0;
        }

        /* 單字跳出效果 */
        .word-pop {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 啟動按鈕微動畫 */
        .play-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255, 255, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
    </style>
</head>
<body class="bg-black w-full h-screen overflow-hidden relative font-sans selection:bg-blue-300 m-0">

    <!-- [啟動遮罩] 進入頁面後必須點擊 -->
    <div id="start-overlay" class="fixed inset-0 z-[200] bg-black/90 flex flex-col items-center justify-center transition-opacity duration-500">
        <button id="start-btn" class="group relative flex items-center justify-center w-32 h-32 md:w-48 md:h-48 bg-white rounded-full play-pulse transition-transform active:scale-95">
            <!-- 三角形播放圖示 -->
            <svg class="w-16 h-16 md:w-24 md:h-24 text-black translate-x-1" fill="currentColor" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z" />
            </svg>
        </button>
        <p class="mt-8 text-white text-xl md:text-2xl font-medium tracking-widest opacity-80">點擊播放鍵開始互動</p>
    </div>

    <!-- 背景圖層 -->
    <div class="w-full h-full flex items-center justify-center">
        <div class="relative inline-block max-w-full max-h-full">
            <img 
                src="https://i.ibb.co/k6VYZnCc/pets.png" 
                onerror="this.src='https://via.placeholder.com/800x600/333333/ffffff?text=Image+Link+Error'; document.getElementById('img-error').classList.remove('hidden');"
                alt="背景寵物" 
                class="block max-w-full max-h-screen object-contain pointer-events-none"
            >
            
            <div id="img-error" class="absolute top-4 left-1/2 -translate-x-1/2 bg-red-600/90 text-white px-6 py-2 rounded-lg hidden whitespace-nowrap z-50 text-sm md:text-base shadow-lg backdrop-blur-sm pointer-events-none">
                圖片連結可能已失效或被阻擋。
            </div>

            <!-- 【貓咪 Hooks】 -->
            <div id="hook-cat1" class="absolute top-[76%] left-[10%] w-[14%] aspect-square cursor-pointer hover:bg-white/20 rounded-full transition-all flex items-center justify-center" title="點擊這隻貓"></div>
            <div id="hook-cat2" class="absolute top-[78%] left-[23%] w-[15%] aspect-square cursor-pointer hover:bg-white/20 rounded-full transition-all flex items-center justify-center" title="點擊這隻貓"></div>

            <!-- 【小鳥 Hooks】 -->
            <div id="hook-bird1" class="absolute top-[41%] left-[26%] w-[7%] h-[12%] cursor-pointer hover:bg-white/20 rounded-full transition-all" title="點擊這隻鳥"></div>
            <div id="hook-bird2" class="absolute top-[43%] left-[41%] w-[9%] h-[15%] cursor-pointer hover:bg-white/20 rounded-full transition-all" title="點擊這隻鳥"></div>
            <div id="hook-bird3" class="absolute top-[62%] left-[20%] w-[8%] h-[13%] cursor-pointer hover:bg-white/20 rounded-full transition-all" title="點擊這隻鳥"></div>
        </div>
    </div>

    <!-- 視覺焦點遮罩 (z-index 40) -->
    <div id="dark-overlay" class="fixed inset-0 bg-black opacity-0 pointer-events-none transition-opacity duration-500 z-40"></div>

    <!-- 單字教學顯示區 (z-index 100) -->
    <div id="word-display" class="fixed inset-0 flex items-center justify-center z-[100] pointer-events-none hidden">
        <h2 id="word-text" class="text-white text-8xl md:text-[12rem] font-black tracking-tighter drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)] word-pop">
            cat
        </h2>
    </div>

    <!-- 貓咪互動動畫 (z-index 50) -->
    <img 
        id="running-gif-cat" 
        src="https://i.ibb.co/mC6F89Wt/Happy-Tom-And-Jerry-Sticker-by-Cartoon-Network-Asia.gif" 
        class="fixed bottom-10 md:bottom-20 w-48 md:w-64 z-50 pointer-events-none hidden drop-shadow-2xl"
        style="right: -300px;"
    >

    <!-- 小鳥互動動畫 (z-index 50) -->
    <img 
        id="running-gif-bird" 
        src="https://i.ibb.co/PG85BGmL/Bird-Budgie-GIF.gif" 
        class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 md:w-[32rem] z-50 pointer-events-none hidden drop-shadow-2xl"
    >

    <!-- 音頻資源 -->
    <!-- [空白解鎖音效] 使用 Base64 靜音 Wav -->
    <audio id="silent-unlock" src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" preload="auto"></audio>
    
    <audio id="cat-chase-audio" src="https://raw.githubusercontent.com/JOUCHUCHEN/K1/main/tom_jerry-Trimmed%20by%20FlexClip.mp3" preload="auto"></audio>
    <audio id="cat-meow-audio" src="https://raw.githubusercontent.com/JOUCHUCHEN/K1/main/29-1-cat%20sounds.mp3" preload="auto"></audio>
    <audio id="cat-pron-audio" src="https://raw.githubusercontent.com/JOUCHUCHEN/K1/main/30-1-cat.mp3" preload="auto"></audio>

    <audio id="bird-initial-audio" src="https://raw.githubusercontent.com/JOUCHUCHEN/K1/main/29-2-bird%20sounds.mp3" preload="auto"></audio>
    <audio id="bird-background-audio" src="https://raw.githubusercontent.com/JOUCHUCHEN/K1/main/tom_jerry-Trimmed%20by%20FlexClip%20(1).mp3" preload="auto"></audio>
    <audio id="bird-pron-audio" src="https://raw.githubusercontent.com/JOUCHUCHEN/K1/main/30-2-bird.mp3" preload="auto"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startOverlay = document.getElementById('start-overlay');
            const startBtn = document.getElementById('start-btn');
            const silentUnlock = document.getElementById('silent-unlock');
            const darkOverlay = document.getElementById('dark-overlay');
            const wordDisplay = document.getElementById('word-display');
            const wordText = document.getElementById('word-text');

            const hooksCat = [document.getElementById('hook-cat1'), document.getElementById('hook-cat2')];
            const gifCat = document.getElementById('running-gif-cat');
            const audioCatMeow = document.getElementById('cat-meow-audio');
            const audioCatChase = document.getElementById('cat-chase-audio');
            const audioCatPron = document.getElementById('cat-pron-audio');

            const hooksBird = [document.getElementById('hook-bird1'), document.getElementById('hook-bird2'), document.getElementById('hook-bird3')];
            const gifBird = document.getElementById('running-gif-bird');
            const audioBirdInit = document.getElementById('bird-initial-audio');
            const audioBirdBg = document.getElementById('bird-background-audio');
            const audioBirdPron = document.getElementById('bird-pron-audio');

            const allAudios = [audioCatMeow, audioCatChase, audioCatPron, audioBirdInit, audioBirdBg, audioBirdPron];
            
            let timerInteraction;
            let timerCleanup;
            let timerStart;
            const audioPromises = new Map();

            // 啟動點擊邏輯
            startBtn.addEventListener('click', () => {
                // 改進：只播放空白音效來達成解鎖授權，避免聽到其他動物叫聲
                silentUnlock.play().catch(() => {});

                // 同時對所有標籤執行一次 load() 確保它們進入預載狀態
                allAudios.forEach(a => a.load());

                // 隱藏遮罩
                startOverlay.classList.add('opacity-0');
                setTimeout(() => {
                    startOverlay.style.display = 'none';
                }, 500);
            });

            function safePlay(audio) {
                audio.currentTime = 0;
                const p = audio.play();
                if (p instanceof Promise) {
                    audioPromises.set(audio, p);
                    p.catch(() => {});
                }
                return p;
            }

            function safePause(audio) {
                const p = audioPromises.get(audio);
                if (p instanceof Promise) {
                    p.then(() => {
                        audio.pause();
                        audioPromises.delete(audio);
                    }).catch(() => {});
                } else {
                    audio.pause();
                }
            }

            function clearAllStates() {
                clearTimeout(timerInteraction);
                clearTimeout(timerCleanup);
                clearTimeout(timerStart);
                
                [gifCat, gifBird].forEach(gif => {
                    gif.classList.remove('running-animation', 'bird-animation');
                    gif.style.display = 'none';
                });
                
                wordDisplay.classList.add('hidden');
                darkOverlay.classList.remove('opacity-75');
                darkOverlay.classList.add('opacity-0');
                
                allAudios.forEach(a => safePause(a));
            }

            function startInteraction(type) {
                clearAllStates();

                if (type === 'cat') {
                    safePlay(audioCatMeow);
                    timerStart = setTimeout(() => {
                        gifCat.style.display = 'block';
                        gifCat.classList.add('running-animation');
                        darkOverlay.classList.remove('opacity-0');
                        darkOverlay.classList.add('opacity-75');
                        safePlay(audioCatChase);

                        timerInteraction = setTimeout(() => {
                            safePause(audioCatChase);
                            gifCat.style.display = 'none';
                            wordText.innerText = "cat";
                            wordDisplay.classList.remove('hidden');
                            safePlay(audioCatPron);
                            timerCleanup = setTimeout(clearAllStates, 4500);
                        }, 6000);
                    }, 800); 

                } else if (type === 'bird') {
                    safePlay(audioBirdInit);
                    timerStart = setTimeout(() => {
                        gifBird.style.display = 'block';
                        gifBird.classList.add('bird-animation');
                        darkOverlay.classList.remove('opacity-0');
                        darkOverlay.classList.add('opacity-75');
                        safePlay(audioBirdBg);

                        timerInteraction = setTimeout(() => {
                            gifBird.style.display = 'none'; 
                            timerInteraction = setTimeout(() => {
                                safePause(audioBirdBg);
                                wordText.innerText = "bird";
                                wordDisplay.classList.remove('hidden');
                                safePlay(audioBirdPron);
                                timerCleanup = setTimeout(clearAllStates, 4500);
                            }, 1000);
                        }, 4000);
                    }, 1500);
                }
            }

            hooksCat.forEach(hook => hook.addEventListener('click', () => startInteraction('cat')));
            hooksBird.forEach(hook => hook.addEventListener('click', () => startInteraction('bird')));
        });
    </script>
</body>
</html>
